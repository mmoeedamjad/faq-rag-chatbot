<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Help Center support chat assistant for PulseDesk. Ask questions and get instant, accurate, AI-powered support replies.">
    <title>PulseDesk Support Chat — AI Assistant</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=1.2">
</head>
<body>
    <div class="ambient-bg"></div>
    <div class="chat-container">
        <div class="chat-header">
            <div class="header-info">
                <div class="header-avatar">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
                    </svg>
                </div>
                <div>
                    <h2>PulseDesk Support</h2>
                    <span class="status-indicator">
                        <span class="status-dot"></span>
                        AI Assistant Online
                    </span>
                </div>
            </div>
        </div>
        <div id="chat-window" class="chat-window"></div>
        <form id="chat-form" class="chat-input-form">
            <input type="text" id="user-input" placeholder="Ask a question..." autocomplete="off" required>
            <button type="submit" id="send-button">
                <span>Send</span>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </form>
    </div>
    <script src="{{ url_for('static', filename='chat.js') }}?v=1.2"></script>
</body>
</html>
